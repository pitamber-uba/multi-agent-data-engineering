pipeline:
  name: shopify_order_summary_etl2
  ticket: "TICKET-Demo3"
  description: >
    ETL pipeline that connects to a localhost MySQL database,
    reads the FIRST 500 rows from MyFonts_Legacy.myfonts_shopify_data
    (using SQL LIMIT 500 — see extract.row_limit), applies 6 transformation
    steps: clean email to lowercase, derive email domain, extract order year
    and month from created_at, categorize status into status_group, drop
    unnecessary columns (skuid, eula_id, md5, font_identifier), and select
    the final 14 columns for the target table.

    Loads the result into MyEtlDemo.order_summary using replace mode
    (drops and recreates the table on each run).

    The pipeline must build SQLAlchemy connection URLs from the extract
    and load config below using pymysql as the driver:
      mysql+pymysql://{username}:{password}@{host}:{port}/{database}

    The pipeline must also generate a main.py entry point that reads
    the password from the SOURCE_DB_PASSWORD and TARGET_DB_PASSWORD
    environment variables (using os.environ), constructs the URLs,
    instantiates the pipeline class, and calls run().

  extract:
    source: mysql
    driver: pymysql
    host: localhost
    port: 3306
    username: root
    password_env_var: SOURCE_DB_PASSWORD
    database: MyFonts_Legacy
    table: myfonts_shopify_data
    strategy: full_load
    row_limit: 500                                # LIMIT 500 in the SELECT query

  transform:
    steps:
      - clean_strings:
          description: "Lowercase and strip the email column to normalize values."
          columns: [email]
          operations:
            - strip
            - lowercase

      - derive_column:
          description: "Extract email domain (part after @). Set to 'unknown' if email is null or has no @."
          target_field: email_domain
          source_field: email
          expression: "email.split('@')[1] if isinstance(email, str) and '@' in email else 'unknown'"

      - derive_column:
          description: "Extract the year from created_at as an integer column order_year."
          target_field: order_year
          source_field: created_at
          expression: "created_at.year if pd.notna(created_at) else None"

      - derive_column:
          description: "Extract the month from created_at as an integer column order_month."
          target_field: order_month
          source_field: created_at
          expression: "created_at.month if pd.notna(created_at) else None"

      - conditional_column:
          description: >
            Map status into a simpler status_group:
            'success' -> 'completed', 'load' or 'pending' -> 'in_progress',
            everything else -> 'other'.
          target_field: status_group
          source_field: status
          conditions:
            - when: "status == 'success'"
              then: "completed"
            - when: "status in ('load', 'pending', 'processing')"
              then: "in_progress"
            - default: "other"

      - drop_columns:
          columns: [skuid, eula_id, md5, font_identifier]

      - select_columns:
          columns:
            - id
            - created_at
            - order_year
            - order_month
            - order_id
            - order_name
            - email
            - email_domain
            - font_name
            - product_type
            - status
            - status_group
            - attempt_count
            - is_reprocessed

  quality_checks:
    pre_load:
      - row_count_gt: 0
      - required_fields_not_null:
          fields: [id, email, status]
      - column_not_null:
          - id
      - allowed_values:
          column: status_group
          values: [completed, in_progress, other]

  load:
    destinations:
      - name: order_summary
        engine: mysql
        driver: pymysql
        host: localhost
        port: 3306
        username: root
        password_env_var: TARGET_DB_PASSWORD
        database: MyEtlDemo
        table: order_summary
        mode: replace
        chunksize: 500
        auto_create_db: true
        auto_create_table: true
        target_ddl: |
          CREATE TABLE IF NOT EXISTS `order_summary` (
            `id`               bigint unsigned NOT NULL,
            `created_at`       datetime(6) DEFAULT NULL,
            `order_year`       int DEFAULT NULL,
            `order_month`      int DEFAULT NULL,
            `order_id`         varchar(255) DEFAULT NULL,
            `order_name`       varchar(255) DEFAULT NULL,
            `email`            varchar(255) DEFAULT NULL,
            `email_domain`     varchar(255) DEFAULT NULL,
            `font_name`        varchar(255) DEFAULT NULL,
            `product_type`     varchar(255) DEFAULT NULL,
            `status`           varchar(50) DEFAULT NULL,
            `status_group`     varchar(20) DEFAULT NULL,
            `attempt_count`    int DEFAULT 0,
            `is_reprocessed`   bit(1) DEFAULT b'0',
            PRIMARY KEY (`id`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_0900_ai_ci;

  dependencies:
    python: "3.12"
    packages:
      - pandas
      - sqlalchemy
      - pymysql
